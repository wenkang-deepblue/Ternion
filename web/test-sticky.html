<!DOCTYPE html>
<html>
<head>
<style>
  body { height: 2000px; padding: 200px; margin: 0; font-family: sans-serif; }
  .card {
    position: relative;
    width: 600px;
    height: 800px;
    background: #f0f0f0;
    border: 1px solid #ccc;
  }
  .wrapper {
    position: absolute;
    top: 0;
    bottom: 0;
    left: calc(100% + 16px);
    width: 140px;
    background: rgba(255,0,0,0.1); /* just to see it */
  }
  .sticky-btn {
    position: sticky;
    top: calc(50vh - 22px);
    height: 44px;
    background: blue;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="card">
    <h2>Card</h2>
    <div class="wrapper">
      <div class="sticky-btn">Save</div>
    </div>
  </div>
</body>
</html>
