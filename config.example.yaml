# Ternion Configuration Example
# ==============================
#
# This file shows the JSON structure used by the Web Control Panel.
# The actual configuration is stored at: ~/.ternion/config.json
#
# IMPORTANT: This YAML file is for REFERENCE ONLY. Ternion reads configuration
# from ~/.ternion/config.json, which is managed via the Web Control Panel.
#
# To configure Ternion:
# 1. Start the Ternion server: python -m ternion
# 2. Open the Web Control Panel: http://localhost:9120
# 3. Configure API keys, role models, execution mode, and budget
#
# The configuration will be automatically saved to ~/.ternion/config.json
#
# Below is a reference showing all configuration options and their defaults.
# ==============================

# Server Ports
# ------------
# Backend API server (used by Cursor): 9110
# Web Control Panel: 9120
ports:
  backend: 9110
  web: 9120

# Provider Configuration
# ----------------------
# Each provider supports multiple API keys with a selected active key.
# Configure via Web Control Panel > Config > API Keys
providers:
  google:
    api_keys:
      - id: "abc12345"           # Auto-generated ID
        name: "Personal Key"     # User-defined name
        api_key: "AIza..."       # Your Google API key
    selected_key_id: "abc12345"  # Currently active key ID

  anthropic:
    api_keys:
      - id: "def67890"
        name: "Work Key"
        api_key: "sk-ant-..."    # Your Anthropic API key
    selected_key_id: "def67890"

  openai:
    api_keys:
      - id: "ghi11223"
        name: "Dev Key"
        api_key: "sk-..."        # Your OpenAI API key
    selected_key_id: "ghi11223"

# Role Configuration
# ------------------
# Ternion uses 6 roles in its discussion workflow:
# - ternion_a, ternion_b, ternion_c: Divergence phase (parallel RCA)
# - arbiter: Convergence phase (synthesize analyses)
# - writer: Execution phase (generate code) - only used in ternion_full mode
# - reviewer: Final check phase (code review) - only used in ternion_full mode
#
# IMPORTANT: All roles must be explicitly configured via Web Control Panel.
# No default values are provided - user must select provider and model for each.
roles:
  ternion_a:
    provider: "google"
    model: "gemini-3-pro-preview"
  ternion_b:
    provider: "anthropic"
    model: "claude-sonnet-4-5-20250929"
  ternion_c:
    provider: "openai"
    model: "gpt-5.2-pro-2025-12-11"
  arbiter:
    provider: "google"
    model: "gemini-3-pro-preview"
  writer:
    provider: "anthropic"
    model: "claude-opus-4-5-20251101"
  reviewer:
    provider: "openai"
    model: "gpt-5.2-pro-2025-12-11"

# Execution Mode
# --------------
# Must be explicitly configured via Web Control Panel.
# Options:
#   - "cursor_handoff": Ternion analyzes, Cursor implements
#   - "ternion_full": Ternion handles both analysis and implementation
execution_mode: "cursor_handoff"

# Budget Settings
# ---------------
budget:
  monthly_limit_usd: 50.0    # Monthly spending limit in USD
  alert_threshold: 0.9       # Alert at 90% of limit

# User Preferences
# ----------------
theme: "system"              # "light", "dark", "system"
language: "auto"             # "auto", "en", "zh", "es", "fr", "de", "ja", "ko"
hide_usage_disclaimer: false # Hide usage disclaimer in UI
show_thinking_logs: true     # Show thinking logs in output

# Available Models (Reference)
# ----------------------------
# Google:
#   - gemini-3-pro-preview (Gemini 3.0 Pro)
#   - gemini-3-flash-preview (Gemini 3.0 Flash)
#   - gemini-flash-lite-latest (Gemini 2.5 Flash Lite)
#
# Anthropic:
#   - claude-opus-4-5-20251101 (Claude 4.5 Opus)
#   - claude-sonnet-4-5-20250929 (Claude 4.5 Sonnet)
#   - claude-opus-4-1-20250805 (Claude 4.1 Opus)
#
# OpenAI:
#   - gpt-5.2-pro-2025-12-11 (GPT 5.2 Pro)
#   - gpt-5.2-2025-12-11 (GPT 5.2)
#   - gpt-5.1-codex-max (GPT 5.1 Codex Max)
#   - gpt-5.1-codex (GPT 5.1 Codex)
